name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: voyopsx/motowild-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Version
      run: echo "VERSION=0.0.${{ github.run_number }}-RELEASE" >> $GITHUB_ENV

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME:$VERSION -f releases/v1/Dockerfile .

    - name: Push Docker Image
      run: |
        docker push $IMAGE_NAME:$VERSION
